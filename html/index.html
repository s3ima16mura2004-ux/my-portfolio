<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金大黒 豪華おみくじ神社 - ログイン</title>
    <link rel="stylesheet" href="../css/omikuji-core.css?v=2">
    <link rel="stylesheet" href="../css/omikuji-shop.css?v=2">
    <link rel="stylesheet" href="../css/omikuji-map.css?v=2">
    <link rel="stylesheet" href="../css/omikuji-missions.css?v=2">
    <link rel="stylesheet" href="../css/omikuji-seasonal-effects.css?v=2">
    <link rel="stylesheet" href="../css/omikuji-status-effects.css?v=2">
    <link rel="stylesheet" href="../css/omikuji-widgets.css?v=2">
    <link rel="stylesheet" href="../css/omikuji-top.css?v=2">
    <style>
        .login-box {
            max-width: 400px;
            margin: 50px auto;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            border: 2px solid #d9534f;
            text-align: center;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #4a3728;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        .login-btn {
            background-color: #d9534f;
            color: white;
            box-shadow: 0 4px #b94441;
            font-weight: bold;
            font-size: 1.2rem;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.1s;
        }
        .login-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        .error-message {
            color: #d9534f;
            font-weight: bold;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body>
    <audio id="se-coin" src="../sounds/coin2.mp3" preload="auto"></audio>

    <div class="login-box">
        <h2 style="color: #4a3728; margin-bottom: 5px;">⛩️ 神社への参拝 ⛩️</h2>
        <p style="font-size: 0.9rem; color: #777; margin-bottom: 25px;">ユーザー名と合言葉を入力してください</p>

        <div id="error-txt" class="error-message">❌ 合言葉（パスワード）が違います！</div>

        <div class="input-group">
            <label for="username">👤 ユーザー名</label>
            <input type="text" id="username" placeholder="お名前を入力（自由）" value="ゲスト参拝者">
        </div>

        <div class="input-group">
            <label for="password">🔑 合言葉（パスワード）</label>
            <input type="password" id="password" placeholder="合言葉を入力してください">
            <p style="font-size: 0.8rem; color: #999; margin-top: 5px;">※初めての参拝者様は、ここで入力した合言葉が今後の「あなた専用の合言葉」として登録されます。</p>
        </div>

        <div class="input-group">
            <label for="birthMonth">🎂 誕生日（任意・当日ログインで特典あり）</label>
            <div style="display: flex; gap: 8px;">
                <select id="birthMonth" style="flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
                    <option value="">月</option>
                </select>
                <select id="birthDay" style="flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
                    <option value="">日</option>
                </select>
            </div>
        </div>

        <button onclick="tryLogin()" id="loginBtn" class="login-btn">🙏 いざ、参拝する</button>
    </div>

    <script>
        // 誕生日セレクトボックス（月1-12・日1-31）の選択肢を生成する
        (function populateBirthdaySelects() {
            const monthSel = document.querySelector("#birthMonth");
            const daySel = document.querySelector("#birthDay");
            for (let m = 1; m <= 12; m++) {
                const opt = document.createElement("option");
                opt.value = String(m);
                opt.textContent = m + "月";
                monthSel.appendChild(opt);
            }
            for (let d = 1; d <= 31; d++) {
                const opt = document.createElement("option");
                opt.value = String(d);
                opt.textContent = d + "日";
                daySel.appendChild(opt);
            }
        })();
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import {
            getFirestore,
            doc,
            getDoc,
            setDoc,
            updateDoc,
            deleteField
        } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDKvro8iNDBPKVlTEXVp5A8r-OyEJoRgZk",
            authDomain: "omikujisite.firebaseapp.com",
            projectId: "omikujisite",
            storageBucket: "omikujisite.firebasestorage.app",
            messagingSenderId: "213364923898",
            appId: "1:213364923898:web:b8a0a55eef1491bde15843",
            measurementId: "G-BKVJTZKJBQ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 🍀 ラッキーアイテムの一覧（キー・絵文字・名前・効果説明）
        const LUCKY_ITEMS = [
            { key: "daikichi_up", emoji: "🍀", name: "四つ葉のクローバー", desc: "今日1日、大吉運が少しだけアップ！" },
            { key: "prize_up", emoji: "🐟", name: "立派な鯛", desc: "今日1日、獲得賞金が10%アップ！" },
            { key: "tax_half", emoji: "🐍", name: "白蛇の抜け殻", desc: "今日1日、大凶のお祓い料がさらに半額に！" },
            { key: "fever_extra", emoji: "🔔", name: "縁起の良い鈴の音", desc: "今日1日、大凶時のフィーバー回数が+1回に！" },
            { key: "zorome_up", emoji: "🌟", name: "流れ星のかけら", desc: "今日1日、ゾロ目ボーナスが+2,000円に！" }
        ];

        function todayStr() {
            return new Date().toLocaleDateString("ja-JP");
        }

        // 🔐 合言葉（パスワード）をSHA-256でハッシュ化する（ユーザー名をソルトとして混ぜ、単純な照合表攻撃を避ける）
        // ※ クライアントサイドのみで完結する簡易的な対策であり、本格的な認証基盤（Firebase Authenticationなど）の
        //   代わりにはならない点には留意。ただしFirestoreの中身を誰かに見られても素の合言葉が漏れることは防げる
        async function hashPassword(username, password) {
            const data = new TextEncoder().encode("omikuji-salt:" + username + ":" + password);
            const digest = await crypto.subtle.digest("SHA-256", data);
            return Array.from(new Uint8Array(digest)).map(b => b.toString(16).padStart(2, "0")).join("");
        }

        function unlockAudio() {
            const audio = document.querySelector("#se-coin");
            if (audio) {
                audio.play().then(() => {
                    audio.pause();
                    audio.currentTime = 0;
                }).catch(() => {});
            }
        }

        window.tryLogin = async function () {
            unlockAudio();

            const userField = (document.querySelector("#username").value || "").trim() || "ゲスト参拝者";
            const passField = document.querySelector("#password").value;
            const errorTxt = document.querySelector("#error-txt");
            const loginBtn = document.querySelector("#loginBtn");

            if (!passField) {
                errorTxt.textContent = "❌ 合言葉を入力してください！";
                errorTxt.style.display = "block";
                return;
            }
            if (userField.includes("/")) {
                errorTxt.textContent = "❌ ユーザー名に「/」は使用できません！";
                errorTxt.style.display = "block";
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = "🔑 確認中…";

            try {
                const userRef = doc(db, "users", userField);
                const snap = await getDoc(userRef);

                let userData;
                let isNewUser = false;
                let needsPasswordMigration = false;
                const passHash = await hashPassword(userField, passField);

                if (snap.exists()) {
                    userData = snap.data();

                    if (typeof userData.passwordHash === "string") {
                        // 🔐 すでにハッシュ化済みのアカウント
                        if (userData.passwordHash !== passHash) {
                            errorTxt.textContent = "❌ 合言葉（パスワード）が違います！";
                            errorTxt.style.display = "block";
                            document.querySelector("#password").value = "";
                            loginBtn.disabled = false;
                            loginBtn.textContent = "🙏 いざ、参拝する";
                            return;
                        }
                    } else if (typeof userData.password === "string") {
                        // 🛠️ 移行措置：まだ平文パスワードのままの古いアカウント。今回だけ平文で照合し、
                        // 成功したらこの後の保存時にハッシュへ自動移行する（以後は平文を保持しない）
                        if (userData.password !== passField) {
                            errorTxt.textContent = "❌ 合言葉（パスワード）が違います！";
                            errorTxt.style.display = "block";
                            document.querySelector("#password").value = "";
                            loginBtn.disabled = false;
                            loginBtn.textContent = "🙏 いざ、参拝する";
                            return;
                        }
                        needsPasswordMigration = true;
                    } else {
                        // 想定外（合言葉の情報が全くない）：安全側に倒してログインを拒否する
                        errorTxt.textContent = "⚠️ アカウント情報の読み込みに失敗しました。お手数ですが運営にご連絡ください。";
                        errorTxt.style.display = "block";
                        loginBtn.disabled = false;
                        loginBtn.textContent = "🙏 いざ、参拝する";
                        return;
                    }

                    // 🛠️ 過去に作成されたアカウントには存在しないフィールドがある場合があるため、
                    // undefinedのままFirestoreに書き込もうとして失敗しないよう、ここで安全な初期値を補っておく
                    userData.money = typeof userData.money === "number" ? userData.money : 10000;
                    userData.loginBonusDate = userData.loginBonusDate || "";
                    userData.luckyItemDate = userData.luckyItemDate || "";
                    userData.luckyItem = userData.luckyItem || "";
                    userData.taianDate = userData.taianDate || "";
                    userData.taianActive = userData.taianActive === true;
                    userData.birthdayMonth = typeof userData.birthdayMonth === "number" ? userData.birthdayMonth : null;
                    userData.birthdayDay = typeof userData.birthdayDay === "number" ? userData.birthdayDay : null;
                    userData.birthdayBonusYear = typeof userData.birthdayBonusYear === "number" ? userData.birthdayBonusYear : 0;
                    userData.birthdayTicket = userData.birthdayTicket === true;
                    userData.kimagureFeverUntil = typeof userData.kimagureFeverUntil === "number" ? userData.kimagureFeverUntil : 0;
                } else {
                    // 新規登録：入力された合言葉をハッシュ化して保存する（平文は保存しない）
                    isNewUser = true;
                    userData = {
                        passwordHash: passHash,
                        money: 10000,
                        feverCount: 0,
                        prayDate: "",
                        prayCount: 0,
                        loginBonusDate: "",
                        luckyItemDate: "",
                        luckyItem: "",
                        ownedItems: {
                            koban: 0, shinboku: 0, ishikoro: 0, tanzaku: 0,
                            orihime_thread: 0, hikoboshi_star: 0,
                            natsumatsuri_lantern: 0, kingyo: 0, kakigori: 0, hanabi_tama: 0,
                            tsukimi_mochi: 0, momiji_shiori: 0,
                            hatsuyume_fuji: 0, hatsuyume_taka: 0, hatsuyume_nasu: 0
                        },
                        equippedCollectible: "",
                        shopItemKey: "",
                        shopItemRemaining: 0,
                        totalDraws: 0,
                        totalDaikichi: 0,
                        totalProfit: 0,
                        urnLevel: 0,
                        taianDate: "",
                        taianActive: false,
                        bankMoney: 0,
                        dexAchieved: { daidaikichi: false, daikichi: false, kamikichi: false, kichi: false, chuukichi: false, syoukichi: false, suekichi: false, kyou: false, daikyou: false, daidaikyou: false },
                        dexRewardClaimed: false,
                        gotDaidaikichi: false,
                        gotKamikichi: false,
                        gotDaidaikyou: false,
                        gotUshimitsuDraw: false,
                        kamikichiBonus: 0,
                        ishikoro500Claimed: false,
                        gachaTickets: 0,
                        birthdayMonth: null,
                        birthdayDay: null,
                        birthdayBonusYear: 0,
                        birthdayTicket: false,
                        kimagureFeverUntil: 0,
                        tanabataWishDate: "",
                        tanabataLuckDate: "",
                        orihimeHikoboshiMeetCount: 0,
                        orihimeHikoboshiLastMetYear: 0,
                        hatsuyumeComplete: false
                    };
                    await setDoc(userRef, userData);
                }

                errorTxt.style.display = "none";

                const today = todayStr();
                let bonusMsg = "";

                // 🎁 ログインボーナス（1日1回・1,000〜15,000円をランダムに1,000円単位で）
                if (userData.loginBonusDate !== today) {
                    const bonus = 10000 + (Math.floor(Math.random() * 15) + 1) * 1000; // 10,000円+(1000〜15000円を1000円単位で)
                    userData.money = (userData.money || 0) + bonus;
                    userData.loginBonusDate = today;
                    bonusMsg = "\n\n🎁 ログインボーナス！\n本日はじめてのご参拝、" + bonus.toLocaleString() + "円を授かりました！";
                }

                // 🎋 本日のラッキーアイテム抽選（1日1回）
                if (userData.luckyItemDate !== today) {
                    const picked = LUCKY_ITEMS[Math.floor(Math.random() * LUCKY_ITEMS.length)];
                    userData.luckyItemDate = today;
                    userData.luckyItem = picked.key;
                }

                // 🎊 大安吉日イベント抽選（1日1回・20%の確率で発生。個人ごとに判定）
                let taianMsg = "";
                if (userData.taianDate !== today) {
                    userData.taianActive = Math.random() < 0.2;
                    userData.taianDate = today;
                    if (userData.taianActive) {
                        taianMsg = "\n\n🎊【本日は大安吉日】🎊\n大吉運が少しアップ！おみくじ料金が本日だけ半額になります！";
                    }
                }

                // 🎂 誕生日（任意）：選択されていれば保存し、当日ログインなら年1回だけ「大大吉確定チケット」を授与
                const birthMonthField = document.querySelector("#birthMonth").value;
                const birthDayField = document.querySelector("#birthDay").value;
                if (birthMonthField && birthDayField) {
                    userData.birthdayMonth = parseInt(birthMonthField, 10);
                    userData.birthdayDay = parseInt(birthDayField, 10);
                }

                let birthdayMsg = "";
                const now = new Date();
                const currentYear = now.getFullYear();
                if (
                    userData.birthdayMonth === (now.getMonth() + 1) &&
                    userData.birthdayDay === now.getDate() &&
                    userData.birthdayBonusYear !== currentYear
                ) {
                    userData.birthdayBonusYear = currentYear;
                    userData.birthdayTicket = true;
                    birthdayMsg = "\n\n🎂🎉【お誕生日おめでとうございます！】🎉🎂\n「大大吉確定チケット」を1枚授かりました！次の単発おみくじで自動的に大大吉が発動します！";
                }

                // 😲 神の気まぐれフィーバー抽選（ログイン時2%の確率・当選で1時間ショップ全品半額）
                let kimagureFeverMsg = "";
                if (Math.random() < 0.02) {
                    userData.kimagureFeverUntil = Date.now() + (60 * 60 * 1000);
                    kimagureFeverMsg = "\n\n😲【神の気まぐれフィーバー】😲\n神様の気まぐれで、これから1時間だけショップの全アイテムが半額になります！";
                }

                await updateDoc(userRef, {
                    money: userData.money,
                    loginBonusDate: userData.loginBonusDate,
                    luckyItemDate: userData.luckyItemDate,
                    luckyItem: userData.luckyItem,
                    taianDate: userData.taianDate,
                    taianActive: userData.taianActive,
                    birthdayMonth: userData.birthdayMonth,
                    birthdayDay: userData.birthdayDay,
                    birthdayBonusYear: userData.birthdayBonusYear,
                    birthdayTicket: userData.birthdayTicket,
                    kimagureFeverUntil: userData.kimagureFeverUntil
                });

                // 🔐 まだ平文パスワードのままだったアカウントは、今回のログイン成功を機にハッシュ化した値へ移行し、
                // 平文の合言葉フィールドはFirestoreから完全に削除する
                if (needsPasswordMigration) {
                    await updateDoc(userRef, {
                        passwordHash: passHash,
                        password: deleteField()
                    });
                }

                localStorage.setItem("logged_in_user", userField);

                const audio = document.querySelector("#se-coin");
                if (audio) {
                    try {
                        audio.currentTime = 0;
                        audio.play();
                    } catch (e) {}
                }

                const luckyPicked = LUCKY_ITEMS.find(i => i.key === userData.luckyItem);
                const luckyMsg = luckyPicked
                    ? ("\n\n" + luckyPicked.emoji + " 本日のラッキーアイテム：" + luckyPicked.name + "\n(" + luckyPicked.desc + ")")
                    : "";

                alert(
                    (isNewUser ? "🎉 新規登録＆認証成功！\n" : "🎉 認証成功！\n") +
                    "ようこそ、" + userField + "様。おみくじ神社へご案内します！" +
                    bonusMsg + luckyMsg + taianMsg + birthdayMsg + kimagureFeverMsg
                );

                window.location.href = "top.html"; // ログイン後はまずトップページへ移動
            } catch (e) {
                console.error("ログイン処理に失敗しました: ", e);
                errorTxt.textContent = "⚠️ 通信エラーが発生しました。もう一度お試しください。";
                errorTxt.style.display = "block";
                loginBtn.disabled = false;
                loginBtn.textContent = "🙏 いざ、参拝する";
            }
        };
    </script>
</body>
</html>
