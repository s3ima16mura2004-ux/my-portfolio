<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>豪華おみくじ</title>
    <link rel="stylesheet" href="omikuji2.css">
</head>
<body>
    <div id="confetti-overlay"></div>
    <div id="doom-overlay"></div>

    <audio id="se-coin" src="coin.mp3" preload="auto"></audio>
    <audio id="se-shuffle" src="shuffle.mp3" preload="auto"></audio>
    <audio id="se-win" src="win.mp3" preload="auto"></audio>
    <audio id="se-lose" src="lose.mp3" preload="auto"></audio>

    <div class="container">
        <h1>おみくじ（1回 1,000円）</h1>

        <div class="wallet-section" style="text-align: center; margin: 15px 0; font-size: 1.3rem; font-weight: bold; color: #4a3728;">
            💰 あなたの所持金：<span id="money">10000</span>円
        </div>

        <div class="main-layout">
            <div class="omikuji-box">
                <div class="image-wrapper">
                    <img src="" alt="ここにおみくじの結果が出ます" id="image" class="hidden">
                    <p id="placeholder-text">おみくじを引いてね！</p>
                </div>
                <button onclick="omikuji()" class="btn draw-btn">おみくじを引く</button>

                <button id="draw10Btn" onclick="omikuji10()" class="btn" style="background-color: #f0ad4e; color: white; box-shadow: 0 4px #cea235; margin-top: 5px;">🔥 10連おみくじ</button>
                <a href="index.html" id="backToTopBtn" class="btn" style="display: none; background-color: #4a3728; color: white; text-align: center; text-decoration: none; line-height: 1.2;">トップページに戻る</a>
                
                <form action="#" method="POST" class="result-form">
                    <input type="hidden" id="hiddenResult" name="result" value="">
                    <input type="submit" value="結果を送信する" class="btn submit-btn" id="submitBtn" disabled>
                </form>
            </div>

            <table class="prize-table">
                <thead>
                    <tr>
                        <th colspan="3">景品・等級一覧</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1等</td>
                        <td>大吉</td>
                        <td>100,000円</td>
                    </tr>
                    <tr>
                        <td>2等</td>
                        <td>吉</td>
                        <td>10,000円</td>
                    </tr>
                    <tr>
                        <td>3等</td>
                        <td>中吉</td>
                        <td>2,000円</td>
                    </tr>
                    <tr>
                        <td>4等</td>
                        <td>小吉</td>
                        <td>1,000円</td>
                    </tr>
                    <tr>
                        <td>5等</td>
                        <td>末吉</td>
                        <td>500円</td>
                    </tr>
                    <tr class="kyou-row">
                        <td>6等</td>
                        <td>凶</td>
                        <td>はずれ！</td>
                    </tr>
                    <tr class="daiyou-row">
                        <td>7等</td>
                        <td>大凶</td>
                        <td>※お祓い料 10,000円徴収</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="debug-info">
            <p>デバッグ用乱数：<span id="randomNumber"></span></p>
        </div>
    </div>
    <script src="omikuji2.js"></script>
</body>
</html>
