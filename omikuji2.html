<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>おみくじ（1回 1,000円）</title>
    <link rel="stylesheet" href="omikuji2.css">
</head>
<body>

    <div class="container">
        <div class="user-info">
            👤 参拝者：<span id="user-display">ゲスト参拝者</span>様
        </div>

        <h1>おみくじ（1回 1,000円）</h1>

        <div class="money-box">
            💰 あなたの所持金：<span id="money">10000</span>円
        </div>

        <div id="bonus-area" style="display: none; margin-bottom: 15px;">
            <p style="font-size: 0.85rem; color: #d9534f; font-weight: bold; margin-bottom: 8px;">
                😱 資金がピンチです…！神様にお祈りしますか？
            </p>
            <button id="bonusBtn" class="btn-bonus" onclick="getBonusMoney()">🙏 神様にお祈りして3,000円貰う</button>
            <a href="top.html" class="btn-bonus-back">🏠 トップページに戻る</a>
        </div>

        <div class="main-content">
            
            <div class="left-panel">
                <div class="omikuji-box">
                    <p id="placeholder-text">【ここに結果が表示されます】</p>
                    <img id="fortune-image" class="hidden" src="" alt="おみくじ結果">
                    <div id="cutin-element" class="hidden">🪘 ガサガサ…</div>
                </div>

                <div class="button-container">
                    <button class="btn-draw" onclick="omikuji()">おみくじを引く</button>
                    <button class="btn-draw10" id="draw10Btn" onclick="omikuji10()">🔥 10連おみくじ</button>
                    
                    <div style="width: 100%;">
                        <input type="hidden" id="hiddenResult" name="result" value="未抽選">
                        <button type="button" id="submitBtn" class="btn-submit" onclick="submitResults()">結果を送信する</button>
                    </div>
                </div>
            </div>

            <div class="right-panel">
                <table class="prize-table">
                    <thead>
                        <tr>
                            <th colspan="3" class="table-title">景品・等級一覧</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="rank">1等</td>
                            <td class="fortune">大吉</td>
                            <td class="prize">100,000円</td>
                        </tr>
                        <tr>
                            <td class="rank">2等</td>
                            <td class="fortune">吉</td>
                            <td class="prize">10,000円</td>
                        </tr>
                        <tr>
                            <td class="rank">3等</td>
                            <td class="fortune">中吉</td>
                            <td class="prize">2,000円</td>
                        </tr>
                        <tr>
                            <td class="rank">4等</td>
                            <td class="fortune">小吉</td>
                            <td class="prize">1,000円</td>
                        </tr>
                        <tr>
                            <td class="rank">5等</td>
                            <td class="fortune">末吉</td>
                            <td class="prize">500円</td>
                        </tr>
                        <tr class="row-kyo">
                            <td class="rank">6等</td>
                            <td class="fortune">凶</td>
                            <td class="prize">はずれ！</td>
                        </tr>
                        <tr class="row-daikyo">
                            <td class="rank">7等</td>
                            <td class="fortune">大凶</td>
                            <td class="prize">
                                残金の半額(50%)徴収 ※20%で免除！<br>
                                <span style="font-size: 0.75rem; font-weight: bold; color: #ff4d4d;">🔥引いた後は3回「大吉確率10倍」発動！</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>

        <div class="footer-debug">
            ⚙️ デバッグ用乱数：<span id="randomNumber">まだ引いていません (通常モード)
        </div>
    </div>

    <audio id="se-coin" src="coin2.mp3" preload="auto"></audio>
    <audio id="se-shuffle" src="shuffle.mp3" preload="auto"></audio>
    <audio id="se-win" src="win.mp3" preload="auto"></audio>
    <audio id="se-lose" src="lose.mp3" preload="auto"></audio>
    <audio id="se-doom" src="doom.mp3" preload="auto"></audio>
    <div id="confetti-overlay"></div>
    <div id="doom-overlay"></div>

    <!-- Firebaseの初期化（top.htmlと同じプロジェクトを使用） -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import {
            getFirestore,
            collection,
            addDoc
        } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDKvro8iNDBPKVlTEXVp5A8r-OyEJoRgZk",
            authDomain: "omikujisite.firebaseapp.com",
            projectId: "omikujisite",
            storageBucket: "omikujisite.firebasestorage.app",
            messagingSenderId: "213364923898",
            appId: "1:213364923898:web:b8a0a55eef1491bde15843",
            measurementId: "G-BKVJTZKJBQ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 通常の<script>（omikuji2.js）から呼べるようにwindowへ公開
        window.omikujiDB = db;
        window.omikujiCollectionRef = collection(db, "history");
        window.omikujiAddDoc = addDoc;
    </script>

    <script src="omikuji2.js"></script>
</body>
</html>
